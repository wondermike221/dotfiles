format = """
[$directory](bold green)($git_branch$git_state$git_status)
$time $hostname $username [λ](bold green) """

[character]
error_symbol = "[❌](bold red) "
success_symbol = "[⚡](bold green)" 

[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 milliseconds (=10 sec)
format = " took [$duration]($style)"

[conda]
symbol = " "

[directory]
read_only = " "
truncation_length = 2
truncate_to_repo = false
format = "[$path]($style)[$lock_symbol]($lock_style) "
style = "bold green"

[docker_context]
symbol = " "

[git_branch]
symbol = " "

[git_commit]
commit_hash_length = 4
tag_symbol = "🔖 "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
format = ' ([\[$conflicted$deleted$renamed$modified$staged$untracked$ahead_behind\]]($style))'
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
# up_to_date = "✓"
# untracked = "🤷"
# stashed = "📦"
# modified = "📝"
staged = '[++\($count\)](green)'
# renamed = "👅"
deleted = "🗑"

[hostname]
ssh_only = false
format = "[🔷 $hostname™]($style)"
style = "bold white"

[java]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[lua]
symbol = " "

[memory_usage]
symbol = " "

[nodejs]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[package]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
# time_format = "%R" # Hour:Minute Format
# style = "bg:#33658A"
# format = '[ ♥ $time ]($style)'
format = "[$time]($style)"
time_format = "%H:%M"
